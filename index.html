<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Family Tree Builder</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <style type="text/tailwindcss">
    @layer components {
      .btn {
        @apply inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-white transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-slate-950 focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50;
      }
      .btn-sm { @apply h-8 rounded-md px-3 text-xs; }
      .btn-default { @apply h-9 px-4 py-2; }
      .btn-icon { @apply h-9 w-9 px-0; }
      .btn-primary { @apply bg-slate-900 text-slate-50 hover:bg-slate-900/90; }
      .btn-secondary { @apply bg-slate-100 text-slate-900 hover:bg-slate-100/80; }
      .btn-outline { @apply border border-slate-200 bg-white hover:bg-slate-100 hover:text-slate-900; }
      .btn-ghost { @apply hover:bg-slate-100 hover:text-slate-900; }
      .btn-destructive { @apply bg-red-500 text-slate-50 hover:bg-red-500/90; }
      .btn-destructive-ghost { @apply text-red-500 hover:bg-red-50 hover:text-red-600; }
      
      .input-field {
        @apply flex h-9 w-full rounded-md border border-slate-200 bg-transparent px-3 py-1 text-sm shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-slate-500 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-slate-950 disabled:cursor-not-allowed disabled:opacity-50;
      }
      .label-text {
        @apply text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70 text-slate-900 mb-2 block;
      }
    }
  </style>
  <style>
    body { font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; -webkit-user-select: none; background-color: #f8fafc; }
    #canvas-container { position: fixed; top: 56px; left: 0; right: 0; bottom: 0; overflow: hidden; cursor: grab; background: radial-gradient(circle, #e2e8f0 1px, transparent 1px); background-size: 24px 24px; }
    #canvas-container:active { cursor: grabbing; }
    #canvas-inner { position: absolute; top: 0; left: 0; width: 40000px; height: 40000px; transform-origin: 0 0; }
    #canvas-inner.smooth { transition: transform 0.25s cubic-bezier(0.25,0.1,0.25,1); }
    #lines-svg { position: absolute; top: 0; left: 0; width: 40000px; height: 40000px; pointer-events: none; z-index: 1; }
    
    /* Line styles */
    .partner-line { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 6 4; opacity: 0.8; stroke-linecap: round; }
    .parent-line { stroke: #94a3b8; stroke-width: 2; opacity: 0.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
    
    /* Edge toggle */
    .edge-toggle-circle { pointer-events: all; cursor: pointer; fill: #ffffff; stroke: #94a3b8; stroke-width: 1.5; transition: all 0.2s ease; }
    .edge-toggle-circle:hover { stroke: #0f172a; fill: #f8fafc; stroke-width: 2; }
    .edge-toggle-text { pointer-events: none; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; fill: #64748b; text-anchor: middle; dominant-baseline: central; }
    
    /* Person Card container strictly for JS positioning */
    .person-card { position: absolute; z-index: 10; width: 200px; height: 320px; cursor: pointer; pointer-events: auto; }
    .person-card:hover { z-index: 20; }
    .person-card.selected { 
      z-index: 25; 
      --tw-ring-color: #6366f1; 
      --tw-ring-shadow: var(--tw-ring-inset) 0 0 0 calc(2px + var(--tw-ring-offset-width)) var(--tw-ring-color);
      box-shadow: var(--tw-ring-offset-shadow), var(--tw-ring-shadow), 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
      transform: scale(1.02);
    }

    /* Side Panel transition */
    #side-panel { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    #side-panel.open { transform: translateX(0); }
    #side-panel:not(.open) { transform: translateX(100%); }
    
    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="toolbar" class="fixed top-0 left-0 right-0 h-14 bg-white/80 backdrop-blur-md border-b border-slate-200 z-[100] flex items-center px-4 gap-1.5 overflow-x-auto whitespace-nowrap">
    <div class="font-bold text-lg text-slate-900 tracking-tight mr-4 flex items-center gap-2">
      <svg class="w-5 h-5 text-slate-900" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM9 18a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 10v4h4v-4M7 10h10M12 14v4"></path></svg>
      FamilyTree

    </button>
    <div class="flex items-center bg-slate-100 rounded-md p-0.5 ml-2 border border-slate-200/50">

      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg> Fit

    </button>

    <button id="btn-auto-focus" onclick="toggleAutoFocus()" class="btn btn-default btn-ghost text-slate-600" title="Auto focus on expand (on)">

      </svg> Auto Focus

    <button onclick="exportJSON()" class="btn btn-default btn-ghost text-slate-600">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg> Export
    </button>
    <button onclick="document.getElementById('import-file-input').click()" class="btn btn-default btn-ghost text-slate-600">

    </button>

      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg> Clear

    <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-white/80 backdrop-blur sticky top-0 z-10">

        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

  <div id="toast" class="fixed bottom-6 left-1/2 transform -translate-x-1/2 translate-y-20 opacity-0 bg-slate-800 text-white px-5 py-2.5 rounded-full shadow-lg font-medium text-sm z-[200] transition-all duration-300 pointer-events-none flex items-center gap-2"></div>

  <script>
    (function() {
      const CARD_W = 200, CARD_H = 320, H_GAP = 50, V_GAP = 80;
      let people = {}, nextId = 1, selectedPersonId = null;
      let collapsedEdges = new Set();
      let autoFocusOnExpand = true;
      let scale = 1, panX = 0, panY = 0, isPanning = false, panStart = { x:0, y:0 }, panStartPan = { x:0, y:0 };
      let currentLayout = { positions:{}, connections:[], generation:{} };

      const canvasContainer = document.getElementById('canvas-container');
      const canvasInner = document.getElementById('canvas-inner');
      const linesSvg = document.getElementById('lines-svg');
      const sidePanel = document.getElementById('side-panel');
      const panelBody = document.getElementById('panel-body');
      const panelTitle = document.getElementById('panel-title');
      const toast = document.getElementById('toast');
      const zoomIndicator = document.getElementById('zoom-indicator');

      function sortIds(ids) {
        return ids.sort((a,b) => parseInt(a.slice(2)) - parseInt(b.slice(2)));
      }

      function parentKey(parentIds) {
        return sortIds([...parentIds].filter(id => people[id])).join('-');
      }

      function genId() { return 'p_' + (nextId++); }
      function showToast(msg) {
        toast.innerHTML = `<svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> <span>${msg}</span>`;
        toast.style.opacity = '1';
        toast.style.transform = 'translate(-50%, 0)';
        clearTimeout(toast._timeout); 
        toast._timeout = setTimeout(() => {
          toast.style.opacity = '0';
          toast.style.transform = 'translate(-50%, 20px)';
        }, 2500);
      }
      function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

      function normalizeImageUrl(url) {
        if (!url) return '';
        url = url.trim();
        // Pattern 1: https://drive.google.com/file/d/FILE_ID/view...
        let match = url.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
        if (match) return `https://lh3.googleusercontent.com/d/${match[1]}`;
        // Pattern 2: https://drive.google.com/open?id=FILE_ID
        match = url.match(/drive\.google\.com\/open\?id=([a-zA-Z0-9_-]+)/);
        if (match) return `https://lh3.googleusercontent.com/d/${match[1]}`;
        // Pattern 3: https://drive.google.com/uc?id=FILE_ID&export=...
        match = url.match(/drive\.google\.com\/uc\?.*id=([a-zA-Z0-9_-]+)/);
        if (match) return `https://lh3.googleusercontent.com/d/${match[1]}`;
        // Already a lh3 link? pass through
        if (url.includes('lh3.googleusercontent.com')) return url;
        // Any other URL — return as-is
        return url;
      }

      function isGoogleDriveUrl(url) {
        if (!url) return false;
        return /drive\.google\.com\/(file\/d\/|open\?id=|uc\?)/.test(url.trim());
      }
      
      function formatDate(dateString) {
        if (!dateString) return '';
        const [y, m, d] = dateString.split('-');
        if (y && m && d) {
          const date = new Date(y, m - 1, d);
          return date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
        }
        return dateString;
      }

      function toTitleCase(str) {
        if (!str) return '';
        return str.trim().replace(/\b\w/g, c => c.toUpperCase());
      }

      function createPerson(data={}) {
        const id = data.id || genId();
        const p = {
          id, firstName: data.firstName || '', lastName: data.lastName || '', maidenName: data.maidenName || '', nickname: data.nickname || '',
          dateOfBirth: data.dateOfBirth || '', isDeceased: data.isDeceased || false, dateOfDeath: data.dateOfDeath || '', gender: data.gender || 'other', profession: data.profession || '',
          city: data.city || '', country: data.country || '',
          imageUrl: data.imageUrl || '', partnerIds: data.partnerIds || [], parentIds: data.parentIds || [], childIds: data.childIds || []
        };
        people[id] = p;
        return p;
      }

      function removePerson(id) {
        const p = people[id]; if (!p) return;
        for (const pid of p.partnerIds) if (people[pid]) people[pid].partnerIds = people[pid].partnerIds.filter(x => x !== id);
        for (const pid of p.parentIds) if (people[pid]) people[pid].childIds = people[pid].childIds.filter(x => x !== id);
        for (const cid of p.childIds) if (people[cid]) people[cid].parentIds = people[cid].parentIds.filter(x => x !== id);
        delete people[id];
      }

      function addPartnerRelationship(a, b) {
        if (a===b || !people[a] || !people[b]) return;
        if (!people[a].partnerIds.includes(b)) people[a].partnerIds.push(b);
        if (!people[b].partnerIds.includes(a)) people[b].partnerIds.push(a);
      }

      function addChildToParents(childId, parentIds) {
        const valid = parentIds.filter(pid => people[pid]);
        if (valid.length===0 || !people[childId]) return;
        for (const pid of valid) {
          if (!people[pid].childIds.includes(childId)) people[pid].childIds.push(childId);
          if (!people[childId].parentIds.includes(pid)) people[childId].parentIds.push(pid);
        }
        if (valid.length===2) addPartnerRelationship(valid[0], valid[1]);
      }

      // get all parent-set keys that have children (regardless of collapse)
      function getAllParentKeys() {
        const keys = new Set();
        for (const id in people) {
          const p = people[id];
          for (const cid of p.childIds) {
            if (!people[cid]) continue;
            const pids = sortIds(people[cid].parentIds.filter(pid => people[pid]));
            if (pids.length) keys.add(pids.join('-'));
          }
        }
        return [...keys];
      }

      // recursively get descendant edge keys for a given parent key
      function getDescendantEdgeKeys(parentKeyStr) {
        const result = new Set();
        const parentIds = parentKeyStr.split('-').filter(pid => people[pid]);
        const children = new Set();
        for (const pid of parentIds) {
          for (const cid of people[pid].childIds) {
            if (people[cid] && parentKey(people[cid].parentIds.filter(p => people[p])) === parentKeyStr) {
              children.add(cid);
            }
          }
        }
        const childKeys = new Set();
        for (const cid of children) {
          const childPids = people[cid].childIds.filter(c => people[c]);
          for (const gcid of people[cid].childIds) {
            if (!people[gcid]) continue;
            const gpids = sortIds(people[gcid].parentIds.filter(p => people[p]));
            if (gpids.length) childKeys.add(gpids.join('-'));
          }
        }
        for (const ck of childKeys) {
          result.add(ck);
          for (const dk of getDescendantEdgeKeys(ck)) result.add(dk);
        }
        return result;
      }

      function focusOnEdge(key) {
        const parentIds = key.split('-').filter(pid => people[pid]);
        if (parentIds.length === 0) return;

        // Collect all visible children that belong to this parent set
        const children = new Set();
        for (const pid of parentIds) {
          for (const cid of people[pid].childIds) {
            if (!people[cid]) continue;
            const cidParentIds = people[cid].parentIds.filter(p => people[p]);
            const cidParentKey = parentKey(cidParentIds);
            if (cidParentKey === key && currentLayout.positions[cid]) {
              children.add(cid);
            }
          }
        }

        // Nodes to fit: the parents and their (now visible) children
        const nodes = [...parentIds.filter(id => currentLayout.positions[id]), ...children];
        if (nodes.length === 0) return;

        const positions = nodes.map(id => currentLayout.positions[id]);
        const minX = Math.min(...positions.map(p => p.x));
        const minY = Math.min(...positions.map(p => p.y));
        const maxX = Math.max(...positions.map(p => p.x + CARD_W));
        const maxY = Math.max(...positions.map(p => p.y + CARD_H));

        const cw = canvasContainer.clientWidth;
        const ch = canvasContainer.clientHeight;
        const padding = 80;
        const width = maxX - minX + padding * 2;
        const height = maxY - minY + padding * 2;

        // Fit the cluster in the viewport, capped at 1.4× zoom to avoid over‑enlarging
        const scaleX = cw / width;
        const scaleY = ch / height;
        let newScale = Math.min(scaleX, scaleY, 1.4);
        newScale = Math.max(0.12, newScale);   // same lower limit as fitToScreen

        const centerX = (minX + maxX) / 2;
        const centerY = (minY + maxY) / 2;
        panX = cw / 2 - centerX * newScale;
        panY = ch / 2 - centerY * newScale;
        scale = newScale;

        applyTransform(true);   // smooth transition
      }

      // toggle an edge: collapse/expand, and when collapsing, recursively collapse all descendants
      function toggleEdge(key) {
        if (collapsedEdges.has(key)) {
          collapsedEdges.delete(key);
          renderAll();
          if (autoFocusOnExpand) focusOnEdge(key);
        } else {
          collapsedEdges.add(key);
          const descendants = getDescendantEdgeKeys(key);
          for (const dk of descendants) collapsedEdges.add(dk);
          renderAll();
        }
      }

      function toggleAutoFocus() {
        autoFocusOnExpand = !autoFocusOnExpand;
        const btn = document.getElementById('btn-auto-focus');
        if (!btn) return;

        const icon = btn.querySelector('svg');
        if (autoFocusOnExpand) {
          btn.title = 'Auto focus on expand (on)';
          btn.classList.add('text-slate-900');
          btn.classList.remove('text-slate-400');
          if (icon) {
            icon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
            icon.setAttribute('fill', 'currentColor');
          }
        } else {
          btn.title = 'Auto focus on expand (off)';
          btn.classList.add('text-slate-400');
          btn.classList.remove('text-slate-900');
          if (icon) {
            icon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11H7v-2h10v2z"/>';
            icon.setAttribute('fill', 'currentColor');
          }
        }
      }

      window.toggleAutoFocus = toggleAutoFocus;

      function getVisibleIds() {
        const visible = new Set();
        const allIds = Object.keys(people);
        
        // 1. Group people into Partner Clusters
        const visitedCluster = new Set();
        const roots = [];
        
        for (const id of allIds) {
          if (visitedCluster.has(id)) continue;
          
          const cluster = new Set();
          const q = [id];
          visitedCluster.add(id);
          
          while (q.length) {
            const curr = q.shift();
            cluster.add(curr);
            const p = people[curr];
            if (p) {
              for (const pid of p.partnerIds) {
                if (people[pid] && !visitedCluster.has(pid)) {
                  visitedCluster.add(pid);
                  q.push(pid);
                }
              }
            }
          }
          
          // 2. Identify Root Clusters (clusters where NO ONE has a parent)
          let hasParent = false;
          for (const cid of cluster) {
            const cp = people[cid];
            if (cp && cp.parentIds.filter(pid => people[pid]).length > 0) {
              hasParent = true;
              break;
            }
          }
          if (!hasParent) {
            roots.push(...cluster);
          }
        }
        
        // Fallback for isolated cyclical graphs (extremely rare but prevents complete failure)
        if (roots.length === 0 && allIds.length > 0) roots.push(allIds[0]);

        // 3. Traverse from roots to find all visible nodes
        const queue = [...roots];
        const visited = new Set();
        
        while (queue.length) {
          const cur = queue.shift();
          if (visited.has(cur)) continue;
          visited.add(cur);
          visible.add(cur);
          
          const p = people[cur];
          if (!p) continue;
          
          // Partners are always visible if one is visible
          for (const pid of p.partnerIds) {
            if (people[pid] && !visited.has(pid)) {
              queue.push(pid);
            }
          }
          
          // Children are only visible if the edge is not collapsed
          for (const cid of p.childIds) {
            if (!people[cid] || visited.has(cid)) continue;
            const pids = sortIds(people[cid].parentIds.filter(pid => people[pid]));
            const key = pids.join('-');
            if (!collapsedEdges.has(key)) {
              queue.push(cid);
            }
          }
        }
        
        return visible;
      }

      function computeLayout() {
        const visibleIds = getVisibleIds();
        if (visibleIds.size === 0) return { positions:{}, connections:[], generation:{} };

        const allIds = [...visibleIds];
        const generation = {};
        const visited = new Set();
        const queue = [];
        for (const id of allIds) {
          if (people[id].parentIds.filter(pid => visibleIds.has(pid)).length === 0) {
            generation[id] = 0; queue.push(id); visited.add(id);
          }
        }
        if (queue.length===0 && allIds.length>0) { generation[allIds[0]]=0; queue.push(allIds[0]); visited.add(allIds[0]); }
        while (queue.length) {
          const curr = queue.shift();
          for (const cid of people[curr].childIds) {
            if (!visibleIds.has(cid)) continue;
            const newGen = (generation[curr]||0) + 1;
            if (!visited.has(cid)) { generation[cid] = newGen; visited.add(cid); queue.push(cid); }
            else generation[cid] = Math.max(generation[cid], newGen);
          }
        }
        for (const id of allIds) if (!(id in generation)) generation[id] = 0;
        let changed = true, iters = 0;
        while (changed && iters<15) { changed=false; iters++;
          for (const id of allIds) {
            for (const pid of people[id].partnerIds) {
              if (visibleIds.has(pid) && generation[id] !== generation[pid]) {
                const maxGen = Math.max(generation[id], generation[pid]);
                generation[id] = maxGen; generation[pid] = maxGen; changed = true;
              }
            }
          }
          for (const id of allIds) {
            const parentGens = people[id].parentIds.filter(pid=>visibleIds.has(pid)).map(pid=>generation[pid]||0);
            if (parentGens.length && generation[id] <= Math.max(...parentGens)) {
              generation[id] = Math.max(...parentGens)+1; changed = true;
            }
          }
        }
        const minGen = Math.min(...Object.values(generation));
        for (const id of allIds) generation[id] -= minGen;

        const clusterMap = {};
        const clusters = {};
        for (const id of allIds) {
          if (clusterMap[id]) continue;
          const gen = generation[id];
          const memberSet = new Set();
          const stack = [id];
          while (stack.length) {
            const cur = stack.pop();
            if (memberSet.has(cur)) continue;
            memberSet.add(cur);
            for (const pid of people[cur].partnerIds) {
              if (visibleIds.has(pid) && generation[pid]===gen && !memberSet.has(pid)) stack.push(pid);
            }
          }
          const members = sortIds([...memberSet]);
          const cid = members.join('-');
          clusters[cid] = { members: new Set(members), gen };
          for (const m of members) clusterMap[m] = cid;
        }

        const parentSetToChildren = {};
        for (const id of allIds) {
          const pids = sortIds(people[id].parentIds.filter(pid=>visibleIds.has(pid)));
          if (pids.length) {
            const key = pids.join('-');
            (parentSetToChildren[key] = parentSetToChildren[key] || []).push(id);
          }
        }
        
        for (const key of Object.keys(parentSetToChildren)) {
          const pid = key.split('-')[0];
          if (people[pid] && people[pid].childIds) {
            const ordered = people[pid].childIds.map(String);
            parentSetToChildren[key].sort((a, b) => {
              const idxA = ordered.indexOf(String(a));
              const idxB = ordered.indexOf(String(b));
              if (idxA !== -1 && idxB !== -1) return idxA - idxB;
              return 0;
            });
          }
        }

        const positions = {};
        const connections = [];
        const rootClusters = Object.values(clusters).filter(c => {
          for (const m of c.members) if (people[m].parentIds.some(pid=>visibleIds.has(pid))) return false;
          return true;
        }).map(c => sortIds([...c.members]).join('-')).sort((a,b) => parseInt(a.split('-')[0].slice(2)) - parseInt(b.split('-')[0].slice(2)));

        function layoutCluster(clusterId, startX, y) {
          const cl = clusters[clusterId];
          if (!cl) return { width: 0 };
          const memberList = [...cl.members];
          const ownWidth = memberList.length * (CARD_W + H_GAP) - H_GAP;
          const childGroupKeys = new Set();
          for (const m of memberList) {
            for (const cid of people[m].childIds) {
              if (!visibleIds.has(cid)) continue;
              const pids = sortIds(people[cid].parentIds.filter(p=>visibleIds.has(p))).join('-');
              if (pids && parentSetToChildren[pids]) childGroupKeys.add(pids);
            }
          }
          let childrenTotalWidth = 0;
          const childLayouts = [];
          for (const key of childGroupKeys) {
            const children = parentSetToChildren[key] || [];
            const childClusters = new Map();
            for (const cid of children) {
              const ccId = clusterMap[cid];
              if (!ccId) continue;
              if (!childClusters.has(ccId)) childClusters.set(ccId, []);
              childClusters.get(ccId).push(cid);
            }
            let groupWidth = 0;
            const groupLayouts = [];
            for (const [ccId, cids] of childClusters) {
              const sub = layoutCluster(ccId, 0, 0);
              groupLayouts.push({ ccId, width: sub.width, cids });
              groupWidth += sub.width + H_GAP;
            }
            if (groupWidth > 0) groupWidth -= H_GAP;
            childrenTotalWidth += groupWidth + H_GAP*2;
            childLayouts.push({ key, groupLayouts, width: groupWidth });
          }
          if (childrenTotalWidth > 0) childrenTotalWidth -= H_GAP*2;
          const totalWidth = Math.max(ownWidth, childrenTotalWidth);
          const centerX = startX + totalWidth/2;
          const memberStartX = centerX - ownWidth/2;
          for (let i=0; i<memberList.length; i++) {
            positions[memberList[i]] = { x: memberStartX + i*(CARD_W+H_GAP), y };
          }
          let childX = centerX - childrenTotalWidth/2;
          const childY = y + CARD_H + V_GAP;
          for (const group of childLayouts) {
            let innerX = childX;
            for (const sub of group.groupLayouts) {
              layoutCluster(sub.ccId, innerX, childY);
              innerX += sub.width + H_GAP;
            }
            childX += group.width + H_GAP*2;
          }
          for (const m of memberList) {
            for (const pid of people[m].partnerIds) {
              if (pid > m && cl.members.has(pid) && visibleIds.has(pid)) {
                connections.push({ type:'partner', from:m, to:pid });
              }
            }
          }
          for (const key of childGroupKeys) {
            const parentIds = key.split('-').filter(pid=>visibleIds.has(pid));
            const children = parentSetToChildren[key] || [];
            if (parentIds.length && children.length) {
              connections.push({ type:'parent-child', parentIds, childIds: children });
            }
          }
          return { width: totalWidth };
        }

        let globalX = 0;
        for (const cid of rootClusters) {
          const cl = clusters[cid];
          if (!cl) continue;
          const { width } = layoutCluster(cid, globalX, 0);
          globalX += width + H_GAP*3;
        }
        return { positions, connections, generation };
      }

      function renderAll() {
        const oldPos = selectedPersonId && currentLayout.positions ? currentLayout.positions[selectedPersonId] : null;
        currentLayout = computeLayout();
        const newPos = selectedPersonId && currentLayout.positions ? currentLayout.positions[selectedPersonId] : null;
        if (oldPos && newPos) {
          panX -= (newPos.x - oldPos.x) * scale;
          panY -= (newPos.y - oldPos.y) * scale;
        }
        renderCards();
        renderLines();
        updateZoomIndicator();
        saveToLocalStorage();
      }

      function renderLines() {
        linesSvg.innerHTML = '';
        const svgNs = 'http://www.w3.org/2000/svg';
        const line = (x1,y1,x2,y2,cls) => { const l=document.createElementNS(svgNs,'line'); l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2); l.setAttribute('class',cls); return l; };
        const path = (d,cls) => { const p=document.createElementNS(svgNs,'path'); p.setAttribute('d',d); p.setAttribute('class',cls); return p; };

        // Collect toggle positions for all parent keys that have children
        const allParentKeys = getAllParentKeys();
        const togglePositions = new Map();

        // Draw actual connections (only for visible children)
        for (const conn of currentLayout.connections) {
          if (conn.type==='partner') {
            const a=currentLayout.positions[conn.from], b=currentLayout.positions[conn.to];
            if (!a||!b) continue;
            const y=a.y+CARD_H/2, x1=a.x+CARD_W, x2=b.x;
            if (Math.abs(a.y-b.y)<5) linesSvg.appendChild(line(x1,y,x2,y,'partner-line'));
          } else if (conn.type==='parent-child') {
            const parents = conn.parentIds.filter(pid=>currentLayout.positions[pid]);
            const children = conn.childIds.filter(cid=>currentLayout.positions[cid]);
            if (!parents.length||!children.length) continue;
            const parentPositions = parents.map(pid=>currentLayout.positions[pid]);
            const childPositions = children.map(cid=>currentLayout.positions[cid]);
            const parentBottom = Math.max(...parentPositions.map(p=>p.y+CARD_H));
            const childTop = Math.min(...childPositions.map(p=>p.y));
            const midY = (parentBottom + childTop)/2;
            const key = parentKey(parents);

            if (parents.length===1) {
              const p = parentPositions[0];
              const px = p.x+CARD_W/2;
              for (const cid of children) {
                const cp = currentLayout.positions[cid];
                if (!cp) continue;
                const cx = cp.x+CARD_W/2;
                linesSvg.appendChild(path(`M ${px} ${p.y+CARD_H} L ${px} ${midY} L ${cx} ${midY} L ${cx} ${cp.y}`, 'parent-line'));
              }
              if (!togglePositions.has(key)) {
                togglePositions.set(key, { x: px, y: (p.y+CARD_H + midY)/2 });
              }
            } else if (parents.length===2) {
              const [p1,p2] = parentPositions;
              const arePartners = people[parents[0]]?.partnerIds.includes(parents[1]);
              if (arePartners && Math.abs(p1.y-p2.y)<5) {
                const partnerY = p1.y+CARD_H/2;
                const leftX = Math.min(p1.x+CARD_W, p2.x+CARD_W);
                const rightX = Math.max(p1.x, p2.x);
                const midX = (leftX+rightX)/2;
                for (const cid of children) {
                  const cp = currentLayout.positions[cid];
                  if (!cp) continue;
                  const cx = cp.x+CARD_W/2;
                  linesSvg.appendChild(path(`M ${midX} ${partnerY} L ${midX} ${midY} L ${cx} ${midY} L ${cx} ${cp.y}`, 'parent-line'));
                }
                if (!togglePositions.has(key)) {
                  togglePositions.set(key, { x: midX, y: (partnerY + midY)/2 });
                }
              } else {
                // two parents not partners? rare, but handle
                const avgX = (p1.x + p2.x)/2 + CARD_W/2;
                for (const p of parentPositions) {
                  const px = p.x+CARD_W/2;
                  for (const cid of children) {
                    const cp = currentLayout.positions[cid];
                    if (!cp) continue;
                    const cx = cp.x+CARD_W/2;
                    linesSvg.appendChild(path(`M ${px} ${p.y+CARD_H} L ${px} ${midY} L ${cx} ${midY} L ${cx} ${cp.y}`, 'parent-line'));
                  }
                }
                if (!togglePositions.has(key)) {
                  togglePositions.set(key, { x: avgX, y: (parentBottom + midY)/2 });
                }
              }
            }
          }
        }

        // Ensure toggle positions for all parent keys (even if children are hidden)
        for (const key of allParentKeys) {
          if (!togglePositions.has(key)) {
            const parentIds = key.split('-').filter(pid => people[pid] && currentLayout.positions[pid]);
            if (parentIds.length === 0) continue;
            const parentPositions = parentIds.map(pid => currentLayout.positions[pid]);
            const parentBottom = Math.max(...parentPositions.map(p => p.y + CARD_H));
            const estimatedMidY = parentBottom + V_GAP/2;
            if (parentIds.length === 1) {
              const p = parentPositions[0];
              togglePositions.set(key, { x: p.x + CARD_W/2, y: (p.y + CARD_H + estimatedMidY)/2 });
            } else if (parentIds.length === 2) {
              const [p1, p2] = parentPositions;
              const arePartners = people[parentIds[0]]?.partnerIds.includes(parentIds[1]);
              if (arePartners && Math.abs(p1.y - p2.y) < 5) {
                const partnerY = p1.y + CARD_H/2;
                const leftX = Math.min(p1.x + CARD_W, p2.x + CARD_W);
                const rightX = Math.max(p1.x, p2.x);
                const midX = (leftX + rightX)/2;
                togglePositions.set(key, { x: midX, y: (partnerY + estimatedMidY)/2 });
              } else {
                const avgX = (p1.x + p2.x)/2 + CARD_W/2;
                togglePositions.set(key, { x: avgX, y: (parentBottom + estimatedMidY)/2 });
              }
            }
          }
        }

        // Draw toggle circles
        for (const [key, pos] of togglePositions.entries()) {
          const isCollapsed = collapsedEdges.has(key);
          const circle = document.createElementNS(svgNs, 'circle');
          circle.setAttribute('cx', pos.x);
          circle.setAttribute('cy', pos.y);
          circle.setAttribute('r', 10);
          circle.setAttribute('class', 'edge-toggle-circle');
          circle.setAttribute('stroke', '#555');
          circle.setAttribute('fill', '#fff');
          circle.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleEdge(key);
          });
          linesSvg.appendChild(circle);

          const text = document.createElementNS(svgNs, 'text');
          text.setAttribute('x', pos.x);
          text.setAttribute('y', pos.y);
          text.setAttribute('class', 'edge-toggle-text');
          text.textContent = isCollapsed ? '▶' : '▼';
          linesSvg.appendChild(text);
        }
      }

      function updateZoomIndicator() { zoomIndicator.textContent = Math.round(scale*100)+'%'; }
      function applyTransform(smooth=false) {
        if (smooth) { canvasInner.classList.add('smooth'); setTimeout(()=>canvasInner.classList.remove('smooth'),300); }
        canvasInner.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        updateZoomIndicator();
      }

      function zoomIn() { zoomAtPoint(canvasContainer.clientWidth/2, canvasContainer.clientHeight/2, 1.2); }
      function zoomOut() { zoomAtPoint(canvasContainer.clientWidth/2, canvasContainer.clientHeight/2, 1/1.2); }
      function zoomAtPoint(cx,cy,factor) {
        const newScale = Math.min(Math.max(scale*factor,0.08),5);
        const rect = canvasContainer.getBoundingClientRect(); const mx=cx-rect.left, my=cy-rect.top;
        const wx=(mx-panX)/scale, wy=(my-panY)/scale;
        panX = mx - wx*newScale; panY = my - wy*newScale;
        scale = newScale; applyTransform();
      }
      function fitToScreen() {
        const allPos = Object.values(currentLayout.positions);
        if (!allPos.length) { resetView(); return; }
        const minX=Math.min(...allPos.map(p=>p.x)), minY=Math.min(...allPos.map(p=>p.y));
        const maxX=Math.max(...allPos.map(p=>p.x+CARD_W)), maxY=Math.max(...allPos.map(p=>p.y+CARD_H));
        const cw=canvasContainer.clientWidth, ch=canvasContainer.clientHeight;
        scale = Math.max(0.12, Math.min(cw/(maxX-minX+120), ch/(maxY-minY+120), 1.4));
        panX = (cw - (minX+maxX)*scale)/2;
        panY = (ch - (minY+maxY)*scale)/2;
        applyTransform(true);
      }
      function resetView() {
        scale=1; panX=0; panY=0;
        const allPos=Object.values(currentLayout.positions);
        if (allPos.length) {
          const ax=allPos.reduce((s,p)=>s+p.x+CARD_W/2,0)/allPos.length, ay=allPos.reduce((s,p)=>s+p.y+CARD_H/2,0)/allPos.length;
          panX=canvasContainer.clientWidth/2 - ax; panY=canvasContainer.clientHeight/2 - ay;
        }
        applyTransform(true);
      }

      window.showReorderChildren = function(id) {

          </button>
        </div>`;
        panelBody.innerHTML = html;
        sidePanel.classList.add('open');
        
        // Initialize SortableJS for flawless UX
        const capturedParentId = id;
        new Sortable(document.getElementById('reorder-children-list'), {
            animation: 150,
            ghostClass: 'opacity-40',
            dragClass: 'scale-95',
            onEnd: function(evt) {
                if (evt.oldIndex !== evt.newIndex) {
                    window.moveChild(capturedParentId, evt.oldIndex, evt.newIndex);
                }
            }
        });
      };

      window.moveChild = function(parentId, fromIdx, toIdx) {
        fromIdx = parseInt(fromIdx, 10);
        toIdx   = parseInt(toIdx, 10);
        if (isNaN(fromIdx) || isNaN(toIdx) || fromIdx === toIdx) return;
        
        const p = people[parentId]; if(!p) return;
        
        // Build ordered list of valid children
        const validChildren = p.childIds.filter(cid => people[cid]);
        
        // Splice in-place
        const [item] = validChildren.splice(fromIdx, 1);
        validChildren.splice(toIdx, 0, item);
        
        // Write back to parent
        p.childIds = validChildren;
        
        // Sync the other parent (partner) to the same order
        const validChildrenStrs = validChildren.map(String);
        const allPartnersToUpdate = new Set();
        for (const cid of validChildren) {
          (people[cid].parentIds || []).forEach(pid => { 
            if (String(pid) !== String(parentId)) allPartnersToUpdate.add(pid); 
          });
        }
        for (const pid of allPartnersToUpdate) {
          if (!people[pid]) continue;
          people[pid].childIds = [...people[pid].childIds].sort((a, b) => {
            const idxA = validChildrenStrs.indexOf(String(a));
            const idxB = validChildrenStrs.indexOf(String(b));
            if (idxA !== -1 && idxB !== -1) return idxA - idxB;
            return 0;
          });
        }

        saveToLocalStorage();
        renderAll();
        showReorderChildren(parentId);
      };

        if (!container) return;
        const url = rawUrl?.trim();
        if (!url) {
          container.classList.add('hidden');
          return;
        }
        container.classList.remove('hidden');
        const resolved = normalizeImageUrl(url);
        // Reset preview container in case it was replaced with error div
        const previewWrapper = container.querySelector('.relative');
        if (previewWrapper && !previewWrapper.querySelector('img')) {
          previewWrapper.innerHTML = `<img id="photo-preview-img" src="" class="w-full h-full object-cover object-center" onerror="this.parentElement.innerHTML='<div class=\\'flex items-center justify-center w-full h-full text-slate-400 text-xs text-center p-4\\'>Image could not be loaded. Check the URL or sharing permissions.</div>'">`;
        }
        const currentImg = container.querySelector('img');
        if (currentImg) currentImg.src = resolved;
        if (badge) {
          if (isGoogleDriveUrl(url)) badge.classList.remove('hidden');
          else badge.classList.add('hidden');
          badge.classList.toggle('flex', isGoogleDriveUrl(url));
        }

        p.nickname = toTitleCase(document.getElementById('edit-nickname')?.value||'');
        p.dateOfBirth = document.getElementById('edit-dateOfBirth')?.value||'';
        p.isDeceased = document.getElementById('edit-isDeceased')?.checked||false;
        p.dateOfDeath = document.getElementById('edit-dateOfDeath')?.value||'';
        p.gender = document.getElementById('edit-gender')?.value||'other';
        p.profession = document.getElementById('edit-profession')?.value||'';
        p.city = toTitleCase(document.getElementById('edit-city')?.value||'');
        p.country = toTitleCase(document.getElementById('edit-country')?.value||'');
        p.imageUrl = normalizeImageUrl(document.getElementById('edit-imageUrl')?.value||'');
        renderAll(); selectPerson(id); openEditPanel(id); showToast('Person updated');
      };
      window.deletePersonConfirm = (id) => {
        if (confirm('Delete this person and all their relationships?')) { removePerson(id); if(selectedPersonId===id) selectedPersonId=null; closePanel(); renderAll(); showToast('Person deleted'); }
      };
      window.addPartnerFor = (id) => { const p=createPerson({firstName:'Partner'}); addPartnerRelationship(id,p.id); renderAll(); selectPerson(p.id); openEditPanel(p.id); showToast('Partner added'); };
      window.addParentFor = (id) => {
        const p=people[id]; if(p.parentIds.filter(pid=>people[pid]).length>0) { showToast('Already has parents'); return; }
        const father=createPerson({firstName:'Father', gender:'male'}); 
        const mother=createPerson({firstName:'Mother', gender:'female'});
        addPartnerRelationship(father.id, mother.id);
        addChildToParents(id, [father.id, mother.id]); 
        renderAll(); selectPerson(father.id); openEditPanel(father.id); showToast('Parents added');
      };
      window.addRootPerson = () => { const p=createPerson({firstName:'New Person'}); renderAll(); selectPerson(p.id); openEditPanel(p.id); showToast('New person added'); };

      window.expandAll = () => {
        collapsedEdges.clear();
        renderAll();
        showToast('All branches expanded');
      };
      window.collapseAll = () => {
        const allKeys = getAllParentKeys();
        collapsedEdges = new Set(allKeys);
        renderAll();
        showToast('All branches collapsed');
      };

      window.exportImage = () => {
        const allPos = Object.values(currentLayout.positions);
        if (!allPos.length) { showToast('Tree is empty'); return; }
        
        const minX = Math.min(...allPos.map(p => p.x));
        const minY = Math.min(...allPos.map(p => p.y));
        const maxX = Math.max(...allPos.map(p => p.x + 200));
        const maxY = Math.max(...allPos.map(p => p.y + 240));
        
        const padding = 100;
        const width = maxX - minX + padding * 2;
        const height = maxY - minY + padding * 2;
        
        showToast('Generating HD image...');
        
        const prevSelected = selectedPersonId;
        if (prevSelected) deselectAll();
        
        document.querySelectorAll('.edge-toggle-circle').forEach(el => el.style.opacity = '0');
        document.querySelectorAll('.edge-toggle-text').forEach(el => el.style.opacity = '0');
        
        htmlToImage.toPng(document.getElementById('canvas-inner'), {
            width: width,
            height: height,
            backgroundColor: '#f8fafc',
            fontEmbedCSS: '',
            imagePlaceholder: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=',
            style: {
                transform: `translate(${-minX + padding}px, ${-minY + padding}px) scale(1)`,
                transformOrigin: 'top left',
                width: `${width}px`,
                height: `${height}px`
            },
            pixelRatio: 2 // High definition
        })
        .then(function (dataUrl) {
            const link = document.createElement('a');
            link.download = 'family-tree.png';
            link.href = dataUrl;
            link.click();
            showToast('Image exported successfully');
        })
        .catch(function (error) {
            console.error('Error generating image!', error);
            showToast('Failed to generate image');
        })
        .finally(() => {
            if (prevSelected) selectPerson(prevSelected);
            document.querySelectorAll('.edge-toggle-circle').forEach(el => el.style.opacity = '1');
            document.querySelectorAll('.edge-toggle-text').forEach(el => el.style.opacity = '1');
        });
      };

      window.exportJSON = () => {
        const data = {
          version: 2,
          nextId,
          people: Object.values(people).map(p => ({...p, partnerIds:[...p.partnerIds], parentIds:[...p.parentIds], childIds:[...p.childIds]})),
          collapsedEdges: [...collapsedEdges]
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'family-tree.json';
        a.click();
        showToast('Exported');
      };

      window.importJSON = (event) => {
        const file = event.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = e => {
          try {
            const data = JSON.parse(e.target.result);
            if (!data.people) throw new Error();
            people = {}; nextId = data.nextId || 1;
            const idMap = {};
            let maxId = 0;
            for (const pd of data.people) {
              const np = createPerson({...pd, partnerIds:pd.partnerIds||[], parentIds:pd.parentIds||[], childIds:pd.childIds||[]});
              idMap[pd.id] = np.id;
              const idNum = parseInt(np.id.replace('p_', ''), 10);
              if (!isNaN(idNum) && idNum > maxId) maxId = idNum;
            }
            if (nextId <= maxId) nextId = maxId + 1;
            for (const [,nid] of Object.entries(idMap)) {
              const p = people[nid]; if(!p) continue;
              p.partnerIds = p.partnerIds.map(oid => idMap[oid] || oid).filter(oid => people[oid]);
              p.parentIds = p.parentIds.map(oid => idMap[oid] || oid).filter(oid => people[oid]);
              p.childIds = p.childIds.map(oid => idMap[oid] || oid).filter(oid => people[oid]);
            }
            collapsedEdges = new Set(data.collapsedEdges || []);
            selectedPersonId = null; closePanel(); renderAll(); fitToScreen(); showToast('Imported');
          } catch { showToast('❌ Invalid file'); }
        };
        reader.readAsText(file);
        event.target.value = '';
      };

      window.clearAll = () => {
        if (confirm('Clear entire tree?')) { people = {}; nextId = 1; selectedPersonId = null; collapsedEdges.clear(); closePanel(); renderAll(); resetView(); showToast('Cleared'); }
      };

      function saveToLocalStorage() {
        try {
          localStorage.setItem('family-tree', JSON.stringify({
            people: Object.values(people).map(p => ({...p})),
            nextId,
            collapsedEdges: [...collapsedEdges],
            view: { scale, panX, panY }
          }));
        } catch {}
      }

      function loadFromStorage() {
        try {
          const raw = localStorage.getItem('family-tree'); if (!raw) return false;
          const data = JSON.parse(raw); if (!data.people) return false;
          people = {}; nextId = data.nextId || 1;
          const idMap = {};
          let maxId = 0;
          for (const pd of data.people) { 
            const np = createPerson({...pd}); 
            idMap[pd.id] = np.id; 
            const idNum = parseInt(np.id.replace('p_', ''), 10);
            if (!isNaN(idNum) && idNum > maxId) maxId = idNum;
          }
          if (nextId <= maxId) nextId = maxId + 1;
          for (const [,nid] of Object.entries(idMap)) {
            const p = people[nid]; if (!p) continue;
            p.partnerIds = p.partnerIds.map(oid => idMap[oid] || oid).filter(oid => people[oid]);
            p.parentIds = p.parentIds.map(oid => idMap[oid] || oid).filter(oid => people[oid]);
            p.childIds = p.childIds.map(oid => idMap[oid] || oid).filter(oid => people[oid]);
          }
          collapsedEdges = new Set(data.collapsedEdges || []);
          if (data.view) { scale = data.view.scale || 1; panX = data.view.panX || 0; panY = data.view.panY || 0; }
          return true;
        } catch { return false; }
      }

      window.addEventListener('keydown', e => {
        if (e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
        if (e.key==='Escape') { deselectAll(); closePanel(); }
        if ((e.key==='Delete'||e.key==='Backspace') && selectedPersonId && !sidePanel.classList.contains('open')) {
          if (confirm('Delete selected?')) { removePerson(selectedPersonId); selectedPersonId=null; renderAll(); showToast('Deleted'); }
        }
        if ((e.ctrlKey||e.metaKey) && e.key==='f') { e.preventDefault(); fitToScreen(); }
      });
      canvasContainer.addEventListener('click', e => {
        if (e.target===canvasContainer||e.target===canvasInner||e.target===linesSvg) { if(!isPanning) deselectAll(); }
      });

      function init() {
        if (!loadFromStorage()) {
          createPerson({ firstName:'John', lastName:'Doe', gender:'male', dateOfBirth:'1980-01-15', profession:'Developer' });
        }
        renderAll();
        // Set initial auto‑focus button state to match the default (enabled)
        const btn = document.getElementById('btn-auto-focus');
        if (btn) {
          btn.classList.add('text-slate-900');
          btn.querySelector('svg').innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
        }
        applyTransform();
        updatePanelDefault();
        updateZoomIndicator();
        setTimeout(autoAlignTree, 100);
      }

      window.zoomIn = zoomIn; window.zoomOut = zoomOut; window.fitToScreen = fitToScreen; window.resetView = resetView;
      window.autoAlignTree = autoAlignTree; window.closePanel = closePanel;
      if (document.readyState==='loading') document.addEventListener('DOMContentLoaded', init);
      else init();
    })();
  </script>
  <script type="module">
    import { inject } from 'https://esm.sh/@vercel/analytics';
    inject();
  </script>
</body>
